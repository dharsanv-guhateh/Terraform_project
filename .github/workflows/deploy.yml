name: "Terragrunt Targeted Deploy"

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Environment to Deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - prod
          - both

jobs:
  terragrunt_deploy:
    runs-on: ubuntu-22.04
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v1.3.2
        with:
          terragrunt_version: 0.50.0

      - name: Terragrunt Execution
        run: |
          # Use 'both' as default if triggered by push (where input is empty)
          TARGET="${{ github.event.inputs.target_env }}"
          if [ -z "$TARGET" ]; then TARGET="both"; fi

          if [ "$TARGET" == "dev" ]; then
            DEV_PATH=$(find . -name "dev" -type d | grep -v ".terragrunt-cache" | head -n 1)
            echo "Found Dev at: $DEV_PATH"
            cd "$DEV_PATH" && terragrunt apply --terragrunt-non-interactive
          
          elif [ "$TARGET" == "prod" ]; then
            PROD_PATH=$(find . -name "prod" -type d | grep -v ".terragrunt-cache" | head -n 1)
            echo "Found Prod at: $PROD_PATH"
            cd "$PROD_PATH" && terragrunt apply --terragrunt-non-interactive
          
          else
            LIVE_PATH=$(find . -name "live" -type d | grep -v ".terragrunt-cache" | head -n 1)
            echo "Found Live at: $LIVE_PATH"
            cd "$LIVE_PATH" && terragrunt run-all apply --terragrunt-non-interactive
          fi
